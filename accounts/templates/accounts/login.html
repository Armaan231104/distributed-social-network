{% extends 'base.html' %}

{% block title %}Login - SocialDistribution{% endblock %}

{% block content %}
<div class="edit-wrapper">
    <div class="edit-container login-container">
        <div class="edit-header">
            <h1>Login</h1>
            <p>Use your Django credentials to access your account</p>
        </div>

        {% if form.errors %}
        <div class="error-message">
            <p>Your username and password didn't match. Please try again.</p>
        </div>
        {% endif %}

        <form method="post" class="edit-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required>
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>

            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </div>
</div>

<style>
/* Glass-style container consistent with Edit Profile */
.login-container {
    max-width: 480px;
    margin: 60px auto;
    padding: 40px;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(244, 23, 23, 0.15);
    border: 1px solid rgba(255, 26, 98, 0.15);
}

/* Header gradient like edit page */
.edit-header h1 {
    font-size: 28px;
    margin-bottom: 8px;
    font-weight: 600;
    background: linear-gradient(90deg,#ff1a62,#ffa023);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.edit-header p {
    font-size: 15px;
    color: #555;
    margin-bottom: 30px;
    text-align: center;
}

/* Form inputs match Edit Profile */
.edit-form input {
    width: 90%;
    box-sizing: border-box;
    padding: 16px 18px;
    margin: 10px 5%;
    border-radius: 16px;
    border: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.85);
    font-size: 15px;
    transition: 0.25s ease;
}

.edit-form input:focus {
    border-color: #ff1a62;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(255,26,98,0.12);
    outline: none;
}

/* Action button like Edit Profile */
.btn-primary {
    padding: 14px 26px;
    border-radius: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    background: linear-gradient(45deg, #ff1a62, #ffa023);
    color: white;
    border: none;
    transition: 0.25s ease;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 45px rgba(244,23,23,0.35);
}

/* Error message consistent with glass vibe */
.error-message {
    background: rgba(255, 26, 98, 0.1);
    color: #ff1a62;
    padding: 14px 16px;
    border-radius: 16px;
    margin-bottom: 20px;
    font-weight: 500;
    text-align: center;
}

@media (max-width: 500px) {
    .login-container {
        margin: 40px 20px;
        padding: 30px;
    }
}
</style>
{% endblock %}
