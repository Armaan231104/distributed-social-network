{% extends "base.html" %}
{% block title %}Awaiting Approval{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    .icon-wrapper {
        display: inline-block;
        position: relative;
    }

    .icon-wrapper::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        height: 400px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
        animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
        50%       { transform: translate(-50%, -50%) scale(1.2); opacity: 0.2; }
    }
</style>

<div style="max-width:700px; margin:0 auto; text-align:center; padding-top:60px;">
    <div class="icon-wrapper">
        <i id="flip-icon" class="fa-regular fa-clock" style="font-size:360px; color:black;"></i>
    </div>
    <br><br>
    <h1 style="margin-top:25px; font-size:28px;">Account Pending Approval</h1>
    <p style="margin-top:12px; font-size:14px; color:#555;">
        Your account has been created successfully.
    </p>
    <p style="margin-top:8px; font-size:14px; color:#555;">
        A node administrator must approve your account before you can start using the community.
    </p>
    <p style="margin-top:8px; font-size:14px; color:#555;">
        Please check back later.
    </p>
</div>

<script>
    const icon = document.getElementById('flip-icon');
    let deg = 0;

    setInterval(() => {
        deg += 5;
        icon.style.transform = `rotateY(${deg}deg)`;

        if (deg % 360 === 90)  icon.className = 'fa-solid fa-lock';
        if (deg % 360 === 270) icon.className = 'fa-regular fa-clock';
    }, 30);
</script>

{% endblock %}
